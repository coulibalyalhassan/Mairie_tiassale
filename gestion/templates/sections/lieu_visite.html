<section class="py-5 overflow-hidden" id="tourisme">
    <div class="container">
        {% for t in en_tetes %}
        <div class="text-center mb-5" data-aos="fade-up">
            <h2 class="fw-bold">{{ t.titre }}</h2>
            <div class="mx-auto" style="width: 60px; height: 3px; background: #007bff; margin-bottom: 15px;"></div>
            <p class="text-muted">{{ t.description }}</p>
        </div>
        {% endfor %}

        <div class="row g-5">
            {% for v in siteVisites %}
            <div class="col-md-6 col-lg-4">
                <div class="tourisme-card" 
                     data-aos="zoom-out-up"
                     data-aos-delay="{{ forloop.counter0 }}00">
                    
                    <div class="img-container mb-3 shadow-sm">
                        <img src="{{ v.image.url }}" alt="{{ v.nom }}" class="img-fluid rounded-3">
                    </div>
                    
                    <div class="info-content px-2">
                        <span class="badge bg-primary mb-2">{{ v.type_lieu }}</span>
                        <h4 class="h5 fw-bold mb-1">{{ v.nom }}</h4>
                        <p class="text-muted small mb-2">
                            <i class="fas fa-map-marker-alt me-1 text-danger"></i> {{ v.adresse }}
                        </p>
                        <p class="description-courte">{{ v.description }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init({
    duration: 10000, // Vitesse de l'animation (1s)
    once: false     // L'animation ne se joue qu'une seule fois
  });
</script>
<style>
#tourisme {
    background: radial-gradient(circle at center, #5e0101 0%, #d8c2c5 100%);
    perspective: 1000px; /* Nécessaire pour les effets 3D */
}

.tourisme-card {
    position: relative;
    transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    transform-style: preserve-3d;
}

/* L'image avec effet de masque et zoom */
.img-container {
    position: relative;
    overflow: hidden;
    border-radius: 20px;
    height: 300px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    transform: translateZ(0);
    transition: all 0.6s ease;
}

.img-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(40%) brightness(0.9); /* Effet dramatique de base */
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

/* L'effet d'éclat au survol (Shimmer) */
.img-container::after {
    content: '';
    position: absolute;
    top: 0;
    left: -150%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: 0.6s;
}

/* Hover - Le moment "Extraordinaire" */
.tourisme-card:hover {
    transform: rotateY(5deg) rotateX(5deg) translateY(-15px); /* Inclinaison 3D */
}

.tourisme-card:hover .img-container {
    box-shadow: 0 30px 60px rgba(0,123,255,0.25);
}

.tourisme-card:hover .img-container img {
    filter: grayscale(0%) brightness(1.1);
    transform: scale(1.15) rotate(2deg);
}

.tourisme-card:hover .img-container::after {
    left: 150%;
}

/* Style du texte sous l'image */
.info-content {
    margin-top: -30px; /* Chevauchement léger */
    position: relative;
    z-index: 2;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px); /* Flou derrière le texte */
    padding: 20px;
    border-radius: 15px;
    margin-left: 15px;
    margin-right: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    transition: all 0.4s ease;
}

.tourisme-card:hover .info-content {
    background: #ffffff;
    transform: translateZ(20px); /* Le texte sort vers l'utilisateur */
}

.badge {
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 0.7rem;
    padding: 6px 12px;
}
</style>
