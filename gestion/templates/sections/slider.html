<!-- Section Hero / Bannière principale -->
    <section class="hero-section">
        <div class="container-fluid p-0">
            <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="0" class="active"></button>
                    <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="1"></button>
                    <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="2"></button>
                </div>              
                <div class="carousel-inner">
                    {% for slide in slides %}
                    <div class="carousel-item active">
                        <div class="carousel-caption text-start">
                            <h1 class="display-4">{{ slide.titre }}</h1>
                            <p class="lead">{{ slide.description }}</p>
                            <a href="{{ slide.lien }}" class="btn btn-primary btn-lg">{{ slide.bouton }}</a>
                        </div>
                        <div class="hero-overlay"></div>
                        <img src="{{ slide.image.url }}" class="d-block w-100" alt="Vue d'Abidjan">
                    </div>
                    {% endfor %}
                <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
                </div>
            </div>
        </div>
    </section>
    <style>
        .hero-section .carousel-item img {
    width: 100%;
    max-height: 500px; /* hauteur maximale du slide */
    object-fit: cover;  /* rempli le conteneur sans déformation */
}

    </style>
