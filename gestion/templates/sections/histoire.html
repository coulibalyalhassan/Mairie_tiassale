<section class="history-text py-5" style="background: #02022d; color: white;">
    <div class="container">
    {% for histoire in histoires %}
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <h1 class="display-4 fw-bold mb-4 text-center">{{ histoire.titre }}</h1>
                <div class="lead-text mb-5">
                    <p>
                        {{ histoire.description1 }}
                    </p>
                    <p>
                        {{ histoire.description2 }}
                    </p>
                    <p>
                       {{ histoire.description3 }}
                    </p>
                </div>
            </div>
        </div>

        <hr class="my-5 border-secondary opacity-25">

        <div class="row align-items-center py-5">
            <div class="col-lg-6 mb-4 mb-lg-0">
                <div class="image-wrapper rounded-4 overflow-hidden shadow-lg border border-primary border-opacity-25">
                    <img src="{{ histoire.image.url }}" alt="Le fleuve Bandama à Tiassalé" class="img-fluid">
                </div>
            </div>
            <div class="col-lg-6 ps-lg-5">
                <p class="text-white-50 fs-5">
                    {{ histoire.description_bandama }}
                </p>
            </div>
        </div>

        <div class="video-section mt-5 py-5 text-center">
            <h2 class="display-6 fw-bold mb-5">{{ histoire.titre_video }}</h2>
           <div class="video-container mx-auto p-3 rounded-5 shadow-2xl" style="max-width: 900px; background: rgba(255,255,255,0.05);">
               <div class="ratio ratio-16x9">
                   <video class="rounded-4" controls>
                       <source src="{{ histoire.lien_video.url }}" type="video/mp4">
                   </video>
               </div>
           </div>
        </div>
    {% endfor %}
    </div>
</section>
<style>
    .lead-text p {
        font-size: 1.15rem;
        line-height: 1.8;
        color: rgba(255, 255, 255, 0.85);
        margin-bottom: 2rem;
        text-align: justify;
    }

    .image-wrapper img {
        transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        width: 100%;
        height: 400px; /* ou height: 50vh; pour plus responsive */
        overflow: hidden;
        border-radius: 1rem; /* arrondi des coins */
        border: 1px solid rgba(0, 123, 255, 0.25); /* border-primary léger */
        box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15); /* shadow-lg */
    }

    .image-wrapper:hover img {
        transform: scale(1.05);
    }

    .video-container {
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(5px);
            box-shadow: 0 0.5rem 1rem rgba(255, 255, 255, 0.1);
    }

    /* Dégradé sur le titre principal */
    h1.display-4 {
        background: linear-gradient(to right, #ffffff, #3b82f6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
</style>
