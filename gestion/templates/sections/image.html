<!-- Section Galerie de la Ville -->
<section class="ville-galerie py-5 bg-light">
    <div class="container">
        <!-- En-tête -->
        <div class="row mb-5">
        {% for t in en_tetes %}
            <div class="col-12 text-center">
                <h2 class="display-5 fw-bold mb-3">{{ t.titre }}</h2>
                <p class="lead text-muted mx-auto" style="max-width: 700px;">
                    {{ t.description }}
                </p>
            </div>
        {% endfor %}
        </div>
        <!-- Galerie d'images -->
        <div class="row g-4">
            {% for img in images %}
            <!-- Image 1 -->
            <div class="col-lg-3 col-md-4 col-sm-6">
                <div class="image-card position-relative overflow-hidden rounded-3 shadow-sm">
                    <img src="{{ img.image.url }}" 
                         class="img-fluid w-100" 
                         alt="Monument de la ville" 
                         style="height: 250px; object-fit: cover;">
                    <div class="image-overlay position-absolute top-0 start-0 w-100 h-100 d-flex align-items-end p-3">
                        <h6 class="text-white fw-bold mb-0">{{ img.titre }}</h6>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
