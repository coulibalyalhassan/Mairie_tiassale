<div class="page-banner banner-variant-dark">
    {% for banner in banners %}
  <div class="banner-background">
    <div class="banner-image" style="background-image: url('{{ banner.image.url }}');"></div>
    <div class="banner-overlay"></div>
  </div>
  <div class="banner-content">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-lg-8">
          <nav aria-label="breadcrumb" class="breadcrumb-nav mb-3">
            <ol class="breadcrumb">
              <li class="breadcrumb-item"><a href="accueil.html">Accueil</a></li>
              <li class="breadcrumb-item active" aria-current="page">
                <a href="{{ banner.page_html }}">{{ banner.nom_page }}</a>
              </li>
            </ol>
          </nav>
          <h1 class="banner-title mb-3">{{ banner.titre }}</h1>
          <p class="banner-subtitle lead">{{ banner.description }}</p>       
        </div>
      </div>
    </div>
  </div> 
  {% endfor %}
</div>

<style>
/* =============================================
   BANNIÈRE ULTRA-MODERNE - MAIRIE 4.0
   Effets : glassmorphism, halo lumineux,
   vague animée, révélation du titre,
   grain texturé, parallaxe douce.
   ============================================= */

.page-banner {
  position: relative;
  width: 100%;
  min-height: 550px; /* hauteur élancée */
  display: flex;
  align-items: center;
  overflow: hidden;
  background-color: #203858; /* fallback */
  color: #fff;
  font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
  isolation: isolate; /* contrôle du z-index */
}

/* ------------------------------
   ARRIÈRE-PLAN CINÉMATIQUE
   Image en léger zoom permanent
   ------------------------------ */
.banner-background {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

.banner-image {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  filter: brightness(1.1) contrast(1.05);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  will-change: transform;
  animation: subtleZoom 20s infinite alternate ease-in-out;
}

@keyframes subtleZoom {
  0% { transform: scale(1); }
  100% { transform: scale(1.08); }
}

/* ------------------------------
   SUPERPOSITION MULTICOUCHE
   Overlay principal + motif + vague
   ------------------------------ */
.banner-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 30% 40%, rgba(10,30,50,0.25) 0%, rgba(4,15,25,0.35) 90%);
  z-index: 2;
}

/* Motif de points subtil (grain) */
.banner-overlay::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
}

/* Vague organique animée (SVG-like en pur CSS) */
.banner-overlay::before {
  content: "";
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 180px;
  background: linear-gradient(135deg, rgba(255,215,100,0.15) 0%, transparent 50%);
  clip-path: path("M0,100 C150,200 350,0 500,100 C650,200 850,0 1000,100 L1000,250 L0,250 Z");
  animation: waveMove 12s infinite alternate ease-in-out;
  opacity: 0.6;
}

@keyframes waveMove {
  0% { transform: translateX(0%) translateY(0px); }
  100% { transform: translateX(-5%) translateY(-10px); }
}

/* ------------------------------
   CONTENU PRINCIPAL (au premier plan)
   Carte en verre dépoli, flottante
   ------------------------------ */
.banner-content {
  position: relative;
  z-index: 10;
  width: 100%;
  padding: 60px 0;
  backdrop-filter: blur(6px); /* glassmorphisme */
  -webkit-backdrop-filter: blur(8px);
  background: rgba(10,25,40,0.18);
  border-radius: 0 40px 40px 0; /* coin arrondi côté gauche */
  box-shadow: 0 25px 40px -15px rgba(0,0,0,0.3);
  margin: 20px 0;
  border-left: 4px solid rgba(255,215,100,0.7); /* accueil lumineux */
  animation: slideIn 1.2s cubic-bezier(0.23, 1, 0.32, 1);
}

@keyframes slideIn {
  0% { opacity: 0; transform: translateX(-40px); }
  100% { opacity: 1; transform: translateX(0); }
}

.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 20px;
}

.row {
  display: flex;
  flex-wrap: wrap;
  margin-right: -15px;
  margin-left: -15px;
}

.align-items-center {
  align-items: center;
}

.col-lg-8 {
  position: relative;
  width: 100%;
  padding-right: 15px;
  padding-left: 15px;
}

@media (min-width: 992px) {
  .col-lg-8 {
    flex: 0 0 66.666667%;
    max-width: 66.666667%;
  }
}

/* ------------------------------
   FIL D'ARIANE – ÉLÉGANT & INTERACTIF
   ------------------------------ */
.breadcrumb-nav {
  margin-bottom: 1.5rem;
}

.breadcrumb {
  display: flex;
  flex-wrap: wrap;
  padding: 0;
  margin: 0;
  list-style: none;
  background: transparent;
}

.breadcrumb-item {
  font-size: 0.95rem;
  font-weight: 500;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.8);
}

.breadcrumb-item a {
  color: rgba(255,255,255,0.9);
  text-decoration: none;
  padding: 0.2rem 0.6rem;
  border-radius: 30px;
  transition: all 0.3s;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(4px);
}

.breadcrumb-item a:hover {
  background: rgba(255,215,100,0.2);
  color: #ffe6a6;
  box-shadow: 0 0 0 2px rgba(255,215,100,0.3);
}

.breadcrumb-item + .breadcrumb-item::before {
  content: "▸";
  color: rgba(255,215,100,0.8);
  padding: 0 0.7rem;
  font-size: 1.2rem;
  line-height: 1;
  vertical-align: middle;
}

.breadcrumb-item.active a {
  color: #ffe6a6;
  font-weight: 600;
  background: rgba(255,215,100,0.15);
  pointer-events: none; /* page courante non cliquable */
  border: 1px solid rgba(255,215,100,0.4);
}

/* ------------------------------
   TITRE PRINCIPAL – RÉVÉLATION DYNAMIQUE
   ------------------------------ */
.banner-title {
  font-size: 3.5rem;
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: 1.2rem;
  color: white;
  text-shadow: 0 5px 15px rgba(0,0,0,0.3);
  letter-spacing: -0.01em;
  position: relative;
  display: inline-block;
  animation: glowTitle 3s infinite alternate;
}

@keyframes glowTitle {
  0% { text-shadow: 0 5px 15px rgba(0,0,0,0.3); }
  100% { text-shadow: 0 5px 25px rgba(255,215,100,0.5), 0 0 0 1px rgba(255,215,100,0.1); }
}

/* Ligne décorative sous le titre */
.banner-title::after {
  content: "";
  position: absolute;
  bottom: -12px;
  left: 0;
  width: 100px;
  height: 4px;
  background: linear-gradient(90deg, #ffd764, #ffb347, #ffd764);
  border-radius: 4px;
  animation: widthPulse 4s infinite alternate;
}

@keyframes widthPulse {
  0% { width: 80px; opacity: 0.8; }
  100% { width: 150px; opacity: 1; }
}

/* ------------------------------
   SOUS-TITRE / DESCRIPTION
   Élégant et aéré
   ------------------------------ */
.banner-subtitle {
  font-size: 1.4rem;
  font-weight: 350;
  line-height: 1.6;
  color: rgba(255,255,255,0.95);
  max-width: 90%;
  margin-top: 1.8rem;
  padding-right: 2rem;
  border-left: 3px solid #ffd764;
  padding-left: 1.2rem;
  font-style: normal;
  letter-spacing: 0.3px;
  text-shadow: 0 2px 5px rgba(0,0,0,0.2);
  backdrop-filter: blur(2px);
}

/* ------------------------------
   ADAPTATION MOBILE
   ------------------------------ */
@media (max-width: 991px) {
  .page-banner {
    min-height: 500px;
  }
  .banner-content {
    border-radius: 0;
    backdrop-filter: blur(6px);
  }
  .banner-title {
    font-size: 2.5rem;
  }
  .banner-subtitle {
    font-size: 1.2rem;
    max-width: 100%;
  }
  .col-lg-8 {
    max-width: 100%;
    flex: 0 0 100%;
  }
  .banner-overlay::before {
    height: 120px;
  }
}

@media (max-width: 576px) {
  .banner-title {
    font-size: 2rem;
  }
  .banner-subtitle {
    font-size: 1rem;
  }
  .breadcrumb-item {
    font-size: 0.8rem;
  }
}

</style>
