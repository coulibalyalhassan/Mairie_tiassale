<!-- Header et Navigation -->
<header class="sticky-top">
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
            <div class="container">
                {% for nav in navigations %}
                <!-- Logo -->
                <a class="navbar-brand" href="#">
                    {% if nav.logo %}
                    <img src="{{ nav.logo.url }}" alt="Logo Mairie" height="60">
                    {% endif %}
                    <span class="brand-text">
                        <strong>{{ nav.nom_mairie }}</strong>
                        <small class="d-block text-muted">{{ nav.slogan }}</small>
                    </span>
                </a>
                {% endfor %}
                <!-- Bouton menu mobile -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
                    <span class="navbar-toggler-icon"></span>
                </button>               
                <!-- Menu principal -->
                <div class="collapse navbar-collapse" id="navbarMain">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        {% for nav_link in nav_links %}
                        <li class="nav-item">
                            <a class="nav-link " href="{{ nav_link.lien_page }}"><i class="fas me-1"></i> {{ nav_link.nom_page }}</a>
                        </li>
                        {% endfor %}
                    </ul>
                    <div class="d-flex ms-lg-3">
                        <a href="contact.html" class="btn btn-primary btn-sm">
                            <i class="fas fa-calendar-check me-1"></i> Prendre RDV
                        </a>
                    </div>
                </div>
            </div>
        </nav>
    </header>
